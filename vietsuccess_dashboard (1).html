<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietsuccess — Project Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --red:#e85555;--redbg:#1e1010;--redborder:#3a1a1a;
  --yellow:#d4a03a;--yellowbg:#1e1a0e;--yellowborder:#332a10;
  --green:#4caf7d;--greenbg:#0e1e15;--greenborder:#1a3325;
  --blue:#4a9edd;--bluebg:#0e1520;--blueborder:#1a2a3a;
  --purple:#9b7fe8;--purplebg:#160e2a;
  --accent:#e85555;
  --radius:10px;--radius-sm:6px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Layout */
.app{max-width:900px;margin:0 auto;padding:24px 20px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.logo{display:flex;align-items:center;gap:10px}
.logo-v{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.logo-name{font-size:15px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.today{text-align:right;font-size:12px;color:var(--text2)}
.today strong{color:var(--text);font-weight:500;display:block;font-size:13px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:24px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;line-height:1}
.metric-value.red{color:var(--red)}
.metric-value.yellow{color:var(--yellow)}
.metric-value.green{color:var(--green)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:3px;width:fit-content}
.tab{padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;color:var(--text2);border:none;background:none;transition:all .15s}
.tab.active{background:var(--bg4);color:var(--text);font-weight:500}

/* Cards */
.cards{display:flex;flex-direction:column;gap:14px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-header{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:12px}
.card-main{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.02em}
.badge.organic{background:#0e2218;color:#4caf7d;border:0.5px solid #1a3325}
.badge.sponsor{background:var(--bluebg);color:var(--blue);border:0.5px solid var(--blueborder)}
.badge.series{background:var(--yellowbg);color:var(--yellow);border:0.5px solid var(--yellowborder)}
.badge.viet{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border)}
.card-meta{font-size:12px;color:var(--text2)}
.card-countdown{text-align:right;flex-shrink:0}
.countdown-num{font-size:30px;font-weight:700;line-height:1;letter-spacing:-1px}
.countdown-num.red{color:var(--red)}
.countdown-num.yellow{color:var(--yellow)}
.countdown-num.green{color:var(--green)}
.countdown-label{font-size:10px;color:var(--text2);margin-top:2px}
.air-date{font-size:11px;color:var(--text3);margin-top:3px}

/* Card sections */
.card-divider{height:0.5px;background:var(--border);margin:0 18px}
.card-section{padding:12px 18px}
.section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

/* Milestones */
.milestones{display:flex;flex-direction:column;gap:7px}
.ms{display:flex;align-items:center;gap:10px}
.ms-date{font-size:11px;color:var(--text2);min-width:58px;font-variant-numeric:tabular-nums}
.ms-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ms-dot.done{background:var(--green)}
.ms-dot.active{background:var(--yellow)}
.ms-dot.pending{background:var(--border2)}
.ms-dot.air{background:var(--red)}
.ms-text{font-size:13px;color:var(--text);flex:1}
.ms-tag{font-size:10px;padding:1px 6px;border-radius:3px}
.ms-tag.brand{background:var(--redbg);color:var(--red);border:0.5px solid var(--redborder)}
.ms-tag.soon{background:var(--yellowbg);color:var(--yellow);border:0.5px solid var(--yellowborder)}

/* Flags */
.flags{display:flex;flex-direction:column;gap:6px}
.flag{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:12px}
.flag.red{background:var(--redbg);color:var(--red);border:0.5px solid var(--redborder)}
.flag.yellow{background:var(--yellowbg);color:var(--yellow);border:0.5px solid var(--yellowborder)}
.flag-icon{font-size:13px;flex-shrink:0;line-height:1.4}

/* Episodes */
.eps-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
.ep{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.ep.active{border-color:var(--yellow)}
.ep-num{font-size:10px;color:var(--text2);margin-bottom:4px}
.ep-date{font-size:13px;font-weight:500}
.ep-status{font-size:10px;margin-top:3px}
.ep-status.active{color:var(--yellow)}
.ep-status.pending{color:var(--text3)}

/* Checklist */
.checklist-toggle{width:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;color:var(--text2);font-size:12px;border-top:0.5px solid var(--border)}
.checklist-toggle:hover{background:var(--bg3)}
.cl-progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:80px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.checklist-body{padding:4px 18px 14px;display:none}
.cl-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-item input{accent-color:var(--green);width:14px;height:14px;cursor:pointer;flex-shrink:0}
.cl-text{font-size:13px;color:var(--text);flex:1}
.cl-text.done{text-decoration:line-through;color:var(--text3)}
.cl-due{font-size:11px;color:var(--text2)}
.cl-due.urgent{color:var(--red);font-weight:500}
.cl-assignee{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text2);border:0.5px solid var(--border)}
.cl-who{display:flex;gap:5px;align-items:center}

/* Add project */
.add-btn{display:flex;align-items:center;gap:8px;padding:14px 18px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;font-size:13px;width:100%;transition:all .15s;margin-top:4px}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--redbg)}
.plus{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input, .form-select, .form-textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:9px 12px;outline:none;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-select option{background:var(--bg2)}
.modal-footer{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:0.5px solid var(--border2);font-weight:500;transition:all .15s}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{opacity:.85}
.btn.ghost{background:none;color:var(--text2)}
.btn.ghost:hover{background:var(--bg3);color:var(--text)}
.btn.danger{background:var(--redbg);border-color:var(--redborder);color:var(--red)}
.btn.danger:hover{background:var(--redborder)}

/* Flag input */
.flags-input{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.flag-row{display:flex;gap:6px;align-items:center}
.flag-row select{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;outline:none}
.flag-row input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;outline:none}
.flag-row button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px}
.flag-row button:hover{color:var(--red)}
.add-flag-btn{background:none;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:12px;padding:6px 12px;width:fit-content}
.add-flag-btn:hover{border-color:var(--text2);color:var(--text)}

/* Edit/delete actions */
.card-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;padding:5px 8px;font-size:12px;transition:all .15s}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.icon-btn.del:hover{border-color:var(--red);color:var(--red);background:var(--redbg)}

/* Sync bar */
.sync-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:8px 16px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-bar.show{opacity:1}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}

/* Section views */
.view{display:none}
.view.active{display:block}

/* Checklist modal tasks */
.cl-section{margin-bottom:10px}
.cl-section-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.ms-items{display:flex;flex-direction:column;gap:4px}
.ms-input-row{display:flex;gap:6px;margin-top:6px}
.ms-input-row input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;outline:none}
.ms-input-row input:focus{border-color:var(--accent)}
.ms-input-row select{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;outline:none}
.ms-item-row{display:flex;align-items:center;gap:6px}
.ms-item-row input[type=text]{flex:1;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;outline:none}
.ms-item-row select{background:var(--bg3);border:0.5px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:5px 6px;font-size:11px;outline:none}
.ms-item-row button{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;font-size:15px}
.ms-item-row button:hover{color:var(--red)}

@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  .eps-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-v">V</div>
      <div>
        <div class="logo-name">Vietsuccess</div>
        <div class="logo-sub">Production Dashboard</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="today" style="margin-right:8px">
        <strong id="today-str">--</strong>
        <span id="active-count">-- dự án</span>
      </div>
      <button class="icon-btn" onclick="exportData()" title="Export JSON gửi team">&#8595; Export</button>
      <label class="icon-btn" style="cursor:pointer" title="Import JSON từ team">&#8593; Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    </div>
  </div>

  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Dự án đang chạy</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Air date gần nhất</div><div class="metric-value yellow" id="m-next">—</div></div>
    <div class="metric"><div class="metric-label">Task cần làm hôm nay</div><div class="metric-value red" id="m-urgent">—</div></div>
    <div class="metric"><div class="metric-label">Cờ đỏ cần xử lý</div><div class="metric-value red" id="m-flags">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchView('projects')">Dự án</button>
    <button class="tab" onclick="switchView('checklist')">Checklist tổng</button>
  </div>

  <div id="view-projects" class="view active">
    <div class="cards" id="cards-container">
      <div class="loading">Đang tải dữ liệu...</div>
    </div>
    <button class="add-btn" onclick="openAddModal()" style="margin-top:14px">
      <span class="plus">+</span>
      Thêm dự án mới
    </button>
  </div>

  <div id="view-checklist" class="view">
    <div id="global-checklist"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Thêm dự án mới</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">Tên dự án *</label>
        <input class="form-input" id="f-name" placeholder="VD: The Quoc Khanh Show — Tập 5">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Loại dự án</label>
          <select class="form-select" id="f-type">
            <option value="organic">Organic</option>
            <option value="sponsor">Sponsored</option>
            <option value="series">IP/Mini Series</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Ngôn ngữ</label>
          <select class="form-select" id="f-lang">
            <option value="viet">Tiếng Việt</option>
            <option value="eng">Tiếng Anh</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Host</label>
          <input class="form-input" id="f-host" placeholder="VD: Quốc Khánh">
        </div>
        <div class="form-group">
          <label class="form-label">Guest</label>
          <input class="form-input" id="f-guest" placeholder="VD: TBD">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày quay *</label>
          <input class="form-input" id="f-shoot" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Ngày air *</label>
          <input class="form-input" id="f-air" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Brand / Sponsor (nếu có)</label>
        <input class="form-input" id="f-brand" placeholder="VD: Manulife Vietnam">
      </div>
      <div class="form-group">
        <label class="form-label">Ghi chú</label>
        <textarea class="form-textarea" id="f-note" placeholder="VD: 5 tập, bi-weekly, cần làm identity + trailer"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Milestones</label>
        <div class="ms-items" id="ms-items"></div>
        <div class="ms-input-row">
          <input id="ms-new-date" type="date" placeholder="Ngày">
          <input id="ms-new-text" placeholder="Tên milestone" style="flex:2">
          <select id="ms-new-status">
            <option value="pending">Chờ</option>
            <option value="active">Đang làm</option>
            <option value="done">Xong</option>
            <option value="air">Air</option>
          </select>
          <button class="btn ghost" onclick="addMilestone()" style="padding:6px 12px;font-size:13px">+</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Cờ rủi ro</label>
        <div class="flags-input" id="flags-input"></div>
        <button class="add-flag-btn" onclick="addFlagInput()">+ Thêm cờ</button>
      </div>

      <div class="form-group">
        <label class="form-label">Checklist PM</label>
        <div id="tasks-input"></div>
        <div class="ms-input-row">
          <input id="task-new-text" placeholder="Tên task">
          <input id="task-new-due" type="date">
          <input id="task-new-who" placeholder="Assignee" style="max-width:90px">
          <button class="btn ghost" onclick="addTaskInput()" style="padding:6px 12px;font-size:13px">+</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" id="delete-btn" onclick="deleteProject()" style="display:none;margin-right:auto">Xóa dự án</button>
      <button class="btn ghost" onclick="closeModal()">Hủy</button>
      <button class="btn primary" onclick="saveProject()">Lưu dự án</button>
    </div>
  </div>
</div>

<div class="sync-bar" id="sync-bar">
  <div class="sync-dot"></div>
  <span id="sync-msg">Đã đồng bộ</span>
</div>

<script>
const TODAY = new Date('2026-03-29');
const STORAGE_KEY = 'vs_projects_v3';

// ── Helpers ──────────────────────────────────────────────────────
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  return Math.round((d - TODAY) / 86400000);
}
function fmtDate(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr);
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

let projects = [];
let tempMs = [];
let tempFlags = [];
let tempTasks = [];

// ── Storage — localStorage (works anywhere) ───────────────────────
function loadProjects(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) projects = JSON.parse(raw);
  } catch(e){ projects = []; }
  if(!projects.length) projects = getDefaultProjects();
  renderAll();
}

function saveProjects(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    showSync('Đã lưu');
  } catch(e){ showSync('Lỗi lưu dữ liệu'); }
}

function refreshLoop(){
  // localStorage là per-browser nên không cần poll
  // Nếu muốn sync team thực sự → host lên Netlify + dùng chung 1 máy
  // hoặc Export/Import JSON bên dưới
}

function showSync(msg){
  const bar = document.getElementById('sync-bar');
  document.getElementById('sync-msg').textContent = msg;
  bar.classList.add('show');
  setTimeout(()=>bar.classList.remove('show'), 2500);
}

// ── Default data ──────────────────────────────────────────────────
function getDefaultProjects(){
  return [
    {

// ── Render ────────────────────────────────────────────────────────
function renderAll(){
  renderMetrics();
  renderCards();
  renderGlobalChecklist();
  const d = TODAY;
  document.getElementById('today-str').textContent =
    d.toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('active-count').textContent = projects.length + ' dự án đang chạy';
}

function renderMetrics(){
  document.getElementById('m-total').textContent = projects.length;
  const days = projects.map(p=>daysUntil(p.airDate)).filter(d=>d!==null && d>=0);
  const minDay = days.length ? Math.min(...days) : null;
  document.getElementById('m-next').textContent = minDay !== null ? minDay + ' ngày' : '—';
  let urgent = 0;
  projects.forEach(p=>(p.tasks||[]).forEach(t=>{
    if(!t.done && t.due && daysUntil(t.due)<=1) urgent++;
  }));
  document.getElementById('m-urgent').textContent = urgent;
  let flags = 0;
  projects.forEach(p=>flags += (p.flags||[]).filter(f=>f.level==='red').length);
  document.getElementById('m-flags').textContent = flags;
}

function renderCards(){
  const c = document.getElementById('cards-container');
  if(!projects.length){
    c.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div>Chưa có dự án nào<br><span style="font-size:12px">Bấm "Thêm dự án mới" để bắt đầu</span></div></div>';
    return;
  }
  c.innerHTML = projects.map(p=>cardHTML(p)).join('');
}

function cardHTML(p){
  const days = daysUntil(p.airDate);
  const cn = days===null?'':days<=3?'red':days<=10?'yellow':'green';

  const typeBadge = p.type==='organic'?'<span class="badge organic">Organic</span>':
    p.type==='sponsor'?'<span class="badge sponsor">Sponsored</span>':
    '<span class="badge series">IP Series</span>';
  const langBadge = p.lang==='eng'?'<span class="badge viet">Tiếng Anh</span>':'<span class="badge viet">Tiếng Việt</span>';
  const brandBadge = p.brand?`<span class="badge sponsor">${esc(p.brand)}</span>`:'';

  const msHTML = (p.milestones||[]).map(m=>`
    <div class="ms">
      <span class="ms-date">${fmtDate(m.date)}</span>
      <span class="ms-dot ${m.status}"></span>
      <span class="ms-text">${esc(m.text)}</span>
      ${m.brand?'<span class="ms-tag brand">Client</span>':''}
      ${daysUntil(m.date)<=3 && daysUntil(m.date)>=0 && m.status!='done'?'<span class="ms-tag soon">'+daysUntil(m.date)+'d</span>':''}
    </div>`).join('');

  const flagsHTML = (p.flags||[]).map(f=>`
    <div class="flag ${f.level}">
      <span class="flag-icon">${f.level==='red'?'▲':'●'}</span>
      <span>${esc(f.text)}</span>
    </div>`).join('');

  const total = (p.tasks||[]).length;
  const done = (p.tasks||[]).filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const taskHTML = (p.tasks||[]).map((t,i)=>{
    const d = daysUntil(t.due);
    const urgentCls = (!t.done && d!==null && d<=1) ? ' urgent' : '';
    return `<div class="cl-item" onclick="toggleTask('${p.id}','${t.id}')">
      <input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation();toggleTask('${p.id}','${t.id}')">
      <span class="cl-text ${t.done?'done':''}">${esc(t.text)}</span>
      <div class="cl-who">
        ${t.who?`<span class="cl-assignee">${esc(t.who)}</span>`:''}
        ${t.due?`<span class="cl-due${urgentCls}">${fmtDate(t.due)}</span>`:''}
      </div>
    </div>`;
  }).join('');

  const noteNote = p.note ? `<div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(p.note)}</div>` : '';

  return `<div class="card" id="card-${p.id}">
    <div class="card-header">
      <div class="card-main">
        <div class="card-title">${esc(p.name)}</div>
        <div class="badges">${typeBadge}${langBadge}${brandBadge}</div>
        <div class="card-meta">Host: ${esc(p.host||'—')} · Guest: ${esc(p.guest||'TBD')} · Quay: ${fmtDate(p.shootDate)}</div>
        ${noteNote}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="card-actions">
          <button class="icon-btn" onclick="openEditModal('${p.id}')">✎ Sửa</button>
        </div>
        <div class="card-countdown">
          <div class="countdown-num ${cn}">${days===null?'—':days}</div>
          <div class="countdown-label">ngày đến air</div>
          <div class="air-date">${fmtDate(p.airDate)} · 12h00</div>
        </div>
      </div>
    </div>
    ${msHTML ? `<div class="card-divider"></div><div class="card-section"><div class="section-label">Milestones</div><div class="milestones">${msHTML}</div></div>` : ''}
    ${flagsHTML ? `<div class="card-divider"></div><div class="card-section"><div class="flags">${flagsHTML}</div></div>` : ''}
    ${total ? `<button class="checklist-toggle" onclick="toggleChecklist('${p.id}')">
      <span>Checklist PM — ${done}/${total} hoàn thành</span>
      <div class="cl-progress">
        <div class="progress-bar"><div class="progress-fill" id="pb-${p.id}" style="width:${pct}%"></div></div>
        <span id="cl-arrow-${p.id}" style="font-size:10px;color:var(--text2)">▶</span>
      </div>
    </button>
    <div class="checklist-body" id="cl-${p.id}">
      <div class="task-list">${taskHTML}</div>
    </div>` : ''}
  </div>`;
}

function renderGlobalChecklist(){
  const el = document.getElementById('global-checklist');
  const allTasks = [];
  projects.forEach(p=>{
    (p.tasks||[]).forEach(t=>{
      allTasks.push({...t, projectName: p.name, projectId: p.id});
    });
  });
  allTasks.sort((a,b)=>{
    if(!a.due) return 1; if(!b.due) return -1;
    return new Date(a.due)-new Date(b.due);
  });
  if(!allTasks.length){el.innerHTML='<div class="empty">Chưa có task nào</div>';return;}
  
  const groups = {};
  allTasks.forEach(t=>{
    const d = daysUntil(t.due);
    const key = d===null?'later':d<0?'overdue':d===0?'today':d<=3?'this_week':'later';
    if(!groups[key]) groups[key]=[];
    groups[key].push(t);
  });
  const labels = {overdue:'⚠ Quá hạn', today:'Hôm nay', this_week:'3 ngày tới', later:'Sau đó'};
  el.innerHTML = Object.entries(labels).filter(([k])=>groups[k]?.length).map(([k,lab])=>`
    <div style="margin-bottom:20px">
      <div class="section-label" style="margin-bottom:10px">${lab} (${groups[k].length})</div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${groups[k].map(t=>`
          <div class="cl-item" style="padding:8px 14px;border-bottom:0.5px solid var(--border)" onclick="toggleTask('${t.projectId}','${t.id}')">
            <input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation();toggleTask('${t.projectId}','${t.id}')">
            <div style="flex:1;min-width:0">
              <span class="cl-text ${t.done?'done':''}">${esc(t.text)}</span>
              <div style="font-size:11px;color:var(--text3);margin-top:1px">${esc(t.projectName)}</div>
            </div>
            <div class="cl-who">
              ${t.who?`<span class="cl-assignee">${esc(t.who)}</span>`:''}
              ${t.due?`<span class="cl-due ${k==='overdue'||k==='today'?'urgent':''}">${fmtDate(t.due)}</span>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── Interactions ──────────────────────────────────────────────────
function toggleChecklist(id){
  const body = document.getElementById('cl-'+id);
  const arrow = document.getElementById('cl-arrow-'+id);
  const open = body.style.display==='block';
  body.style.display = open?'none':'block';
  arrow.textContent = open?'▶':'▼';
}

function toggleTask(projId, taskId){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  const t = p.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.done = !t.done;
  saveProjects();
  renderAll();
  // Re-open checklist that was open
  setTimeout(()=>{
    const body = document.getElementById('cl-'+projId);
    if(body) body.style.display='block';
    const arrow = document.getElementById('cl-arrow-'+projId);
    if(arrow) arrow.textContent='▼';
  }, 50);
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  event.target.classList.add('active');
}

// ── Modal ─────────────────────────────────────────────────────────
function openAddModal(){
  tempMs=[]; tempFlags=[]; tempTasks=[];
  document.getElementById('edit-id').value='';
  document.getElementById('modal-title').textContent='Thêm dự án mới';
  document.getElementById('delete-btn').style.display='none';
  ['f-name','f-host','f-guest','f-brand','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-type').value='organic';
  document.getElementById('f-lang').value='viet';
  document.getElementById('f-shoot').value='';
  document.getElementById('f-air').value='';
  renderModalMs(); renderModalFlags(); renderModalTasks();
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id){
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  tempMs = JSON.parse(JSON.stringify(p.milestones||[]));
  tempFlags = JSON.parse(JSON.stringify(p.flags||[]));
  tempTasks = JSON.parse(JSON.stringify(p.tasks||[]));
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-title').textContent = 'Sửa dự án';
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-type').value = p.type||'organic';
  document.getElementById('f-lang').value = p.lang||'viet';
  document.getElementById('f-host').value = p.host||'';
  document.getElementById('f-guest').value = p.guest||'';
  document.getElementById('f-brand').value = p.brand||'';
  document.getElementById('f-shoot').value = p.shootDate||'';
  document.getElementById('f-air').value = p.airDate||'';
  document.getElementById('f-note').value = p.note||'';
  renderModalMs(); renderModalFlags(); renderModalTasks();
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function renderModalMs(){
  document.getElementById('ms-items').innerHTML = tempMs.map((m,i)=>`
    <div class="ms-item-row">
      <input type="date" value="${m.date||''}" onchange="tempMs[${i}].date=this.value">
      <input type="text" value="${esc(m.text||'')}" onchange="tempMs[${i}].text=this.value" placeholder="Milestone">
      <select onchange="tempMs[${i}].status=this.value">
        ${['pending','active','done','air'].map(s=>`<option value="${s}" ${m.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <button onclick="tempMs.splice(${i},1);renderModalMs()">×</button>
    </div>`).join('');
}

function addMilestone(){
  const date = document.getElementById('ms-new-date').value;
  const text = document.getElementById('ms-new-text').value.trim();
  const status = document.getElementById('ms-new-status').value;
  if(!text) return;
  tempMs.push({date,text,status});
  tempMs.sort((a,b)=>a.date>b.date?1:-1);
  document.getElementById('ms-new-date').value='';
  document.getElementById('ms-new-text').value='';
  renderModalMs();
}

function renderModalFlags(){
  document.getElementById('flags-input').innerHTML = tempFlags.map((f,i)=>`
    <div class="flag-row">
      <select onchange="tempFlags[${i}].level=this.value">
        <option value="red" ${f.level==='red'?'selected':''}>🔴 Đỏ</option>
        <option value="yellow" ${f.level==='yellow'?'selected':''}>🟡 Vàng</option>
      </select>
      <input value="${esc(f.text||'')}" onchange="tempFlags[${i}].text=this.value" placeholder="Nội dung cờ">
      <button onclick="tempFlags.splice(${i},1);renderModalFlags()">×</button>
    </div>`).join('');
}

function addFlagInput(){
  tempFlags.push({level:'red',text:''});
  renderModalFlags();
}

function renderModalTasks(){
  document.getElementById('tasks-input').innerHTML = tempTasks.map((t,i)=>`
    <div class="flag-row">
      <input value="${esc(t.text||'')}" onchange="tempTasks[${i}].text=this.value" placeholder="Task" style="flex:3">
      <input type="date" value="${t.due||''}" onchange="tempTasks[${i}].due=this.value" style="max-width:120px">
      <input value="${esc(t.who||'')}" onchange="tempTasks[${i}].who=this.value" placeholder="Ai" style="max-width:70px">
      <button onclick="tempTasks.splice(${i},1);renderModalTasks()">×</button>
    </div>`).join('');
}

function addTaskInput(){
  const text = document.getElementById('task-new-text').value.trim();
  const due = document.getElementById('task-new-due').value;
  const who = document.getElementById('task-new-who').value.trim();
  if(!text) return;
  tempTasks.push({id:uid(),text,due,who,done:false});
  document.getElementById('task-new-text').value='';
  document.getElementById('task-new-due').value='';
  document.getElementById('task-new-who').value='';
  renderModalTasks();
}

function saveProject(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('Vui lòng nhập tên dự án'); return; }
  const data = {
    name,
    type: document.getElementById('f-type').value,
    lang: document.getElementById('f-lang').value,
    host: document.getElementById('f-host').value.trim(),
    guest: document.getElementById('f-guest').value.trim(),
    brand: document.getElementById('f-brand').value.trim(),
    shootDate: document.getElementById('f-shoot').value,
    airDate: document.getElementById('f-air').value,
    note: document.getElementById('f-note').value.trim(),
    milestones: JSON.parse(JSON.stringify(tempMs)),
    flags: JSON.parse(JSON.stringify(tempFlags)),
    tasks: JSON.parse(JSON.stringify(tempTasks)),
  };
  const editId = document.getElementById('edit-id').value;
  if(editId){
    const idx = projects.findIndex(p=>p.id===editId);
    if(idx>=0){ data.id = editId; projects[idx] = data; }
  } else {
    data.id = uid();
    projects.push(data);
  }
  saveProjects();
  renderAll();
  closeModal();
}

function deleteProject(){
  const id = document.getElementById('edit-id').value;
  if(!id) return;
  if(!confirm('Xóa dự án này?')) return;
  projects = projects.filter(p=>p.id!==id);
  saveProjects();
  renderAll();
  closeModal();
}

// ── Export / Import JSON để sync team ────────────────────────────
function exportData(){
  const blob = new Blob([JSON.stringify(projects, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vs_dashboard_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showSync('Đã export — gửi file này cho team để họ Import');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      projects = data;
      saveProjects();
      renderAll();
      showSync('Import thành công — ' + data.length + ' dự án');
    } catch(err){ alert('File JSON không hợp lệ'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Close modal on overlay click ──────────────────────────────────
document.getElementById('modal').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});

// ── Init ──────────────────────────────────────────────────────────
loadProjects();
